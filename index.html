<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDA 6 - Regras</title>
    <style>
        :root {
            --primary: #bb86fc;
            --secondary: #03dac6;
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background-color: var(--surface);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        h1 {
            color: var(--primary);
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
        }

        .subtitle {
            text-align: center;
            color: var(--secondary);
            font-size: 0.9em;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #content {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 1.1em;
            color: #cfcfcf;
            background: #252525;
            padding: 25px;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8em;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TDA 6 REGRAS</h1>
    <div class="subtitle">SISTEMA OFICIAL DE DIRETRIZES</div>
    
    <div id="content">
1. Respeite todos os membros.
2. Não utilize hacks ou modificações proibidas.
3. Divirta-se acima de tudo!
</div>

    <div class="footer">
        &copy; 2026 TDA 6 - Protocolo de Segurança
    </div>
</div>

</body>
</html>
